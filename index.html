<body>

    <header class="main-header">
        <div class="header-left">
            <div class="logo">SH-HONDA</div>
            <div class="slogan-box">
                <div class="slogan-title">Welcome to our showroom!</div>
                <div class="slogan-sub">Create • Transcend • Augment</div>
            </div>
        </div>

        <div class="header-right">
            <span class="status-text">Beyond limits, conquer the apex.</span>

            
            <div class="search-wrapper">
            <input type="text" class="search-input" id="searchInput" placeholder="Tìm kiếm xe...">
            <button class="search-btn" id="searchBtn" type="button">
                <svg class="search-icon" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const searchBtn = document.getElementById('searchBtn');
        const searchInput = document.getElementById('searchInput');

        searchBtn.addEventListener('click', function(e) {
            // Ngăn chặn sự kiện click lan ra ngoài
            e.stopPropagation(); 
            
            // Nếu ô tìm kiếm đang ẩn -> Bật nó lên và đặt con trỏ chuột vào trong
            if (!searchInput.classList.contains('active')) {
                searchInput.classList.add('active');
                searchInput.focus();
            } else {
                // Nếu đã mở và có chữ -> Thực hiện hành động tìm kiếm
                if (searchInput.value.trim() !== "") {
                    alert("Đang tìm kiếm cụm từ: " + searchInput.value);
                    // Ở đây bạn có thể chuyển trang hoặc gọi API tìm kiếm, ví dụ:
                    // window.location.href = "/search?q=" + encodeURIComponent(searchInput.value);
                } else {
                    // Nếu đã mở nhưng không có chữ -> Thu nhỏ lại
                    searchInput.classList.remove('active');
                }
            }
        });

        // Bấm phím Enter để kích hoạt tìm kiếm nhanh
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && this.value.trim() !== "") {
                alert("Đang tìm kiếm cụm từ: " + this.value);
            }
        });

        // Click ra ngoài vùng tìm kiếm sẽ tự động thu nhỏ thanh tìm kiếm lại
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-wrapper')) {
                searchInput.classList.remove('active');
            }
        });
    </script>
        </div>
    </header>

<script>
    function toggleDropdown(event) {
        // Ngăn chặn sự kiện lan ra ngoài
        event.stopPropagation();
        
        // Lấy menu con nằm trong mục vừa click
        const currentDropdown = event.currentTarget.querySelector('.dropdown-menu');
        
        // Đóng tất cả các dropdown khác đang mở trước đó
        document.querySelectorAll('.dropdown-menu').forEach(menu => {
            if (menu !== currentDropdown) {
                menu.classList.remove('show-dropdown');
            }
        });

        // Bật/tắt menu con được chọn
        if (currentDropdown) {
            currentDropdown.classList.toggle('show-dropdown');
        }
    }

    // Đóng dropdown khi click bất kỳ đâu ngoài màn hình
    window.onclick = function() {
        document.querySelectorAll('.dropdown-menu').forEach(menu => {
            menu.classList.remove('show-dropdown');
        });
    }
</script>
