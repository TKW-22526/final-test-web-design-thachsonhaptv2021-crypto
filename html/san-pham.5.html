<!DOCTYPE html>
<html lang="vi">
<head>

    <script src="../js/script.5.js" defer></script>

    <link rel="stylesheet" href="../css/style.sanpham.css">
    
    <style>
        body {
            background-color: #f8f9fa;
           
        }
        /* Style cho nút về trang chủ phía dưới */

            margin-top: 30px;
            padding: 10px 20px;
            background-color: #6c757d;
            color: #fff;

            border-radius: 5px;
            transition: background 0.2s;
        }
        .btn-home:hover {

        }

</head>
<body>

    <header class="main-header">
        <div class="header-left">
            <div class="logo">SH-HONDA</div>
            <div class="slogan-box">
                <div class="slogan-title">Welcome to our showroom!</div>
                <div class="slogan-sub">Create • Transcend • Augment</div>
            </div>
        </div>

        <div class="header-right">
            <span class="status-text">Beyond limits, conquer the apex.</span>
            
            <div class="search-wrapper">
                <input type="text" class="search-input" id="searchInput" placeholder="Tìm kiếm xe...">
                <button class="search-btn" id="searchBtn" type="button">
                    <svg class="search-icon" viewBox="0 0 24 24">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <div class="red-nav-container">
        <ul class="red-menu">
            <li><a href="san-pham.html">Xe tay ga</a></li>
            <li><a href="san-pham.2.html">Xe số</a></li>
            <li class="active"><a href="san-pham.3.html">Xe côn tay</a></li>
            <li><a href="san-pham.4.html">Xe phân khối lớn</a></li>
            <li><a href="gioi-thieu.html">Xe điện</a></li>
        </ul>

        <ul class="sub-nav">
            <li><a href="lien-he.html" style="color: inherit; text-decoration: none;">Liên hệ</a></li>
        </ul>
    </div>






<div class="breadcrumb">
        <div class="container">
            <a href="gioi-thieu.html">Trang chủ</a>
            <a>/</a>
            <a>Xe phân khối lớn</a>
            
        </div>
    </div>






    <div class="container mt-5">
        <h1 class="text-center text-uppercase fw-bold mb-4" style="color: #1b0d79;">Danh sách xe máy Honda</h1>
        
        <div id="product-list" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4"></div>

    </div>
     
    <script>
        // --- XỬ LÝ THANH TÌM KIẾM ---
        const searchBtn = document.getElementById('searchBtn');
        const searchInput = document.getElementById('searchInput');

        searchBtn.addEventListener('click', function(e) {
            e.stopPropagation(); 
            if (!searchInput.classList.contains('active')) {
                searchInput.classList.add('active');
                searchInput.focus();
            } else {
                if (searchInput.value.trim() !== "") {
                    alert("Đang tìm kiếm cụm từ: " + searchInput.value);
                } else {
                    searchInput.classList.remove('active');
                }
            }
        });

        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && this.value.trim() !== "") {
                alert("Đang tìm kiếm cụm từ: " + this.value);
            }
        });

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-wrapper')) {
                searchInput.classList.remove('active');
            }
        });

        // --- XỬ LÝ THẢ MENU DROPDOWN ---
        function toggleDropdown(event) {
            event.stopPropagation();
            const currentDropdown = event.currentTarget.querySelector('.dropdown-menu');
            
            // Ẩn toàn bộ các dropdown khác đang mở rộng trên trang
            document.querySelectorAll('.dropdown-menu').forEach(menu => {
                if (menu !== currentDropdown) menu.classList.remove('show-dropdown');
            });

            // Bật / tắt dòng trạng thái hiện tại
            if (currentDropdown) {
                currentDropdown.classList.toggle('show-dropdown');
            }
        }

        // Đóng toàn bộ menu dropdown nếu người dùng bấm trượt ra ngoài
        document.addEventListener('click', () => {
            document.querySelectorAll('.dropdown-menu').forEach(menu => {
                menu.classList.remove('show-dropdown');
            });
        });

        // Tải toàn bộ sản phẩm mảng từ file script.js
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof loadAllProducts === 'function' && typeof product !== 'undefined') {
                loadAllProducts(product);
            }
        });
    </script>
</body>
</html>
